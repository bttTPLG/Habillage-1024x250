<!doctype html>
<html lang="fr">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Habillage</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Kanit:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&display=swap"
      rel="stylesheet"
    />

    <style>
      html,
      body {
        margin: 0;
        height: 100%;
        background: #ffffff;
        overflow: hidden;
      }

      /* Wrapper global centré */
      .wrapper {
        width: 100%;
        max-width: 1024px;
        height: 100;
        margin: 0 auto;
        display: flex;
        justify-content: center;
        box-sizing: border-box;
        position: relative;
        background-color: #e30713;
        font-family: "Kanit", sans-serif;
      }

      .white-rectangle {
        position: fixed;
        top: 0;
        left: 50%;
        transform: translateX(-50%);
        width: 1800px;
        height: 1000px;
        background-color: white;
        z-index: 1;
        clip-path: polygon(660px 0px, 1240px 0px, 850px 1000px, 260px 1000px);
        /*animation: closing 3s ease-in-out infinite;*/
      }

      /*

      @keyframes closing {
        0% {
          clip-path: polygon(400px 0px, 1500px 0px, 1100px 1000px, 0px 1000px);
        }

        
        50% {
          clip-path: polygon(900px 0px, 900px 0px, 500px 1000px, 500px 1000px);
        }

        
        100% {
          clip-path: polygon(400px 0px, 1500px 0px, 1100px 1000px, 0px 1000px);
        }
      }
        */

      /* ------------------- COLONNES ------------------- */

      .TPLG-mid {
        position: relative;
        flex: 0 0 480px;
        display: flex;
        flex-direction: column;
        justify-content: flex-start;
        align-items: center;
        height: 250px;
        z-index: 2;
      }

      .TPLG-left,
      .TPLG-right {
        position: relative;
        z-index: 2;
        display: flex;
        flex-direction: column;
        flex: 0 0 272px;
        box-sizing: border-box;
      }

      .TPLG-left,
      .TPLG-right {
        justify-content: center;
        align-items: center;
      }

      /* ---------------------- MID ---------------------- */
      /* ------------------- LOGO TPLG ------------------- */

      .TPLG-logo-container {
        width: 40%;
        height: auto;
        display: flex;
        justify-content: flex-start;
        align-items: center;
        padding: 8px;
      }

      /* ------------------- BANNIÈRE ------------------- */

      .banner-container {
        position: absolute;
        inset: 0;
        z-index: 0;
        overflow: hidden;
        display: flex;
        justify-content: center;
        align-items: end;

        -webkit-mask-image: linear-gradient(
          to right,
          transparent,
          black 20%,
          black 80%,
          transparent
        );
        mask-image: linear-gradient(
          to right,
          transparent,
          black 20%,
          black 80%,
          transparent
        );
      }

      .banner {
        width: 700px;
        height: 85%;
        position: absolute;
        object-fit: cover;
        object-position: 50% 0%;
        transform: scale(1.4);
        opacity: 0.45;
        filter: brightness(1.5) contrast(1.1) saturate(1.5) grayscale(0.2);
      }

      /* -------------------  Carousel Text --------------- */
      .TPLG-text-carousel-container {
        margin: 0;
        width: 100%;
        padding: 0;
        height: 100%;
        flex: 1;
        display: flex;
        flex-direction: column;
        align-items: center;
        box-sizing: border-box;
      }

      .TPLG-text-carousel {
        position: relative;
        padding: 10px;
        box-sizing: border-box;
        width: 100%;
        height: auto;
        display: flex;
        justify-content: center;
      }

      .TPLG-text-carousel2 {
        height: 50px;
        position: relative;
        padding: 20px;
        box-sizing: border-box;
        width: 100%;
        display: flex;
        justify-content: center;
      }

      .TPLG-text-carousel-container p {
        background-color: rgb(255, 255, 255);
        font-size: 18px;
        font-weight: 700;
        position: absolute;
        text-transform: uppercase;
        opacity: 0;
        margin: 0;
        padding: 5px 8px;
      }

      .TPLG-text-carousel .animation-left {
        border-radius: 10px 0 0 0;
        border-top: solid 2px #000000;
        border-left: solid 4px #000000;
        color: #000000;
        animation: rotateText 20s infinite;
        animation-timing-function: ease-in-out;
      }

      .TPLG-text-carousel2 .animation-right {
        color: #e30713;
        border-radius: 0 0 10px 0;
        animation: rotateText2 20s infinite;
        border-right: solid 4px #e30713;
        border-bottom: solid 1px #e30713;
        animation-timing-function: ease-in-out;
      }

      .TPLG-text-carousel p:nth-child(1),
      .TPLG-text-carousel2 p:nth-child(1) {
        animation-delay: 0s;
      }

      .TPLG-text-carousel p:nth-child(2),
      .TPLG-text-carousel2 p:nth-child(2) {
        animation-delay: 4s;
      }
      .TPLG-text-carousel p:nth-child(3),
      .TPLG-text-carousel2 p:nth-child(3) {
        animation-delay: 8s;
      }
      .TPLG-text-carousel p:nth-child(4),
      .TPLG-text-carousel2 p:nth-child(4) {
        animation-delay: 12s;
      }

      .TPLG-text-carousel p:nth-child(5),
      .TPLG-text-carousel2 p:nth-child(5) {
        animation-delay: 16s;
      }

      @keyframes rotateText {
        0%,
        10% {
          opacity: 0;
          transform: translateX(20px);
        }
        10%,
        25% {
          opacity: 1;
          transform: translateX(-20px);
        }
        25%,
        100% {
          opacity: 0;
        }
      }

      @keyframes rotateText2 {
        0%,
        10% {
          opacity: 0;
          transform: translateX(-20px);
        }
        10%,
        25% {
          opacity: 1;
          transform: translateX(20px);
        }
        25%,
        100% {
          opacity: 0;
        }
      }

      /* ----------------  Icons  ------------------- */

      .TPLG-logo-container,
      .TPLG-text-carousel {
        position: relative;
        z-index: 1;
      }

      .TPLG-LOGO {
        width: 80%;
      }

      .TPLG-Icons-container {
        position: relative;
        display: grid;
        grid-template-columns: repeat(6, 1fr);
        height: auto;
      }

      .TPLG-bulle-icon-container:hover {
        transform: translateY(-3px);
      }

      .TPLG-Icons-container div {
        display: flex;
        flex-direction: column;
        align-items: center;
      }

      .TPLG-bulle-icon-container {
        display: flex;
        justify-content: center;
        align-items: center;
        border-radius: 50px;
        width: 46.42%;
        aspect-ratio: 1 / 1;
        background-color: #ffffff;
        border: solid 2px #e30713;
      }

      .TPLG-Icons-container a {
        display: flex;
        justify-content: center;
        width: 100%;
        position: relative;
        z-index: 3;
      }

      .TPLG-Icons-container p {
        margin: 0 0 8px 0;
        font-size: 11px;
        font-weight: 500;
      }

      /* ------------Carousel img -------------------- */
      .TPLG-carousel-container {
        width: 60%;
        height: 70%;
        display: flex;
        flex-direction: column;
      }

      .TPLG-pic-ctn {
        height: 100%;
        width: 100%;
        position: relative;
        overflow: hidden;
        border-radius: 25px;
        border: 3px solid white;
      }

      .TPLG-pic-ctn > img {
        position: absolute;
        top: 0;
        left: 50%;
        transform: translateX(-50%);
        opacity: 0;
        animation: display 10s infinite;
        height: 100%;
        width: 100%;
        object-fit: cover;
      }

      @keyframes display {
        0%,
        25%,
        100% {
          opacity: 0;
        }
        5%,
        20% {
          opacity: 1;
        }
      }

      .TPLG-pic-ctn img:nth-child(2) {
        animation-delay: 2s;
      }
      .TPLG-pic-ctn img:nth-child(3) {
        animation-delay: 4s;
      }
      .TPLG-pic-ctn img:nth-child(4) {
        animation-delay: 6s;
      }
      .TPLG-pic-ctn img:nth-child(5) {
        animation-delay: 8s;
      }

      .TPLG-right .TPLG-LOGO,
      .TPLG-left .TPLG-LOGO {
        margin-bottom: 30px;
        width: 95%;
      }

      .TPLG-global-link {
        position: absolute;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        z-index: 2;
      }

      .TPLG-text-carousel-container p.btn-carousel {
        background-color: transparent;
        border: none;
        box-shadow: none;
        padding: 0;
      }

      .btn-carousel a {
        max-width: 200px;
        min-height: 40px;
        display: inline-flex;
        font-family: "Kanit", sans-serif;
        font-size: 18px;
        align-items: center;
        justify-content: center;
        text-transform: uppercase;
        text-align: center;
        text-decoration: none;
        letter-spacing: 1.3px;
        font-weight: 700;
        color: #ffffff;
        background: #e30713;
        border: #ffffff solid 2px;
        border-radius: 1000px;
        box-shadow: 12px 12px 24px #94050c;
        transition: all 0.3s ease-in-out 0s;
        cursor: pointer;
        outline: none;
        position: relative;
        padding: 10px;
      }

      /* Tu peux ajouter un léger effet hover */
      .btn-carousel a:hover {
        color: #e30713;
        background-color: #ffffff;
        border: #e30713 solid 2px;
        transform: translateY(-6px);
      }

      .btn-carousel a:hover::before,
      .btn-carousel a:focus::before {
        opacity: 1;
      }

      .btn-carousel a::after {
        content: "";
        width: 30px;
        height: 30px;
        border-radius: 100%;
        border: 3px solid #e307124f;
        position: absolute;
        z-index: -1;
        top: 50%;
        left: 50%;
        transform: translate(-50%, -50%);
        animation: ring 1.5s infinite;
      }

      .btn-carousel a:hover::after,
      .btn-carousel a:focus-visible::after {
        animation: none;
        display: none;
      }

      @keyframes ring {
        0% {
          width: 30px;
          height: 30px;
          opacity: 1;
        }
        100% {
          width: 200px;
          height: 200px;
          opacity: 0;
        }
      }
    </style>
  </head>
